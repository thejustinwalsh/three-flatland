<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter">
  <!--
    three-flatland brand mark. Geometric "FL" composed on a 6-step grid
    aligned with the 8pt spacing system. Strokes at 6/96 viewBox carry to
    favicon scale (16px) cleanly. Uses currentColor so the mark inherits
    the theme's foreground / accent depending on context.

    Construction:
      F + L spine (shared vertical):  x=24, y=18..78, then y=78, x=24..78
      F top crossbar:                 y=18, x=24..68
      F middle crossbar (shorter):    y=42, x=24..58
    A small offset square at the upper-right hints at the "sprite" idea
    without becoming literal — a single accent that earns its weight.
  -->
  <path d="M 24 18 L 24 78 L 78 78" />
  <path d="M 24 18 L 68 18" />
  <path d="M 24 42 L 58 42" />
  <rect x="74" y="14" width="8" height="8" fill="currentColor" stroke="none" />
</svg>
