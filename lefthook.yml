# Pre-commit hook configuration. Replaces the former simple-git-hooks +
# lint-staged combination. sync-pack-full explicitly runs git add because
# stage_fixed only re-stages files matching the command's own glob, not files
# in other directories that the command modifies.
output:
  - failure
  - execution_out

pre-commit:
  parallel: false
  commands:
    sync-pack-full:
      glob: "{pnpm-workspace.yaml,packages/*/package.json}"
      run: pnpm sync:pack examples minis && git add examples minis
      stage_fixed: true
    sync-pack-files:
      glob: "{examples,minis}/**/package.json"
      run: pnpm exec tsx scripts/sync-pack.ts --files {staged_files}
      stage_fixed: true
    sync-lockfile:
      glob: "{pnpm-workspace.yaml,**/package.json}"
      run: pnpm install --lockfile-only && git add pnpm-lock.yaml
      stage_fixed: true
    sync-react-subpaths:
      glob: "{packages/three-flatland/src/index.ts,packages/three-flatland/src/*/index.ts,packages/skia/src/ts/three/index.ts}"
      run: pnpm exec tsx scripts/sync-react-subpaths.ts
      stage_fixed: true
    gen-schema-artifacts:
      # Schema or codegen/sync script edits regenerate the .gen.ts type files
      # AND stage the public docs/public/schemas/<n>.v<MAJOR>.json copy. Both
      # touch files outside this hook's glob, so explicit `git add` is needed
      # (mirrors sync-pack-full's pattern; stage_fixed only re-stages files
      # matching the original glob).
      #
      # This hook can fail by design — malformed JSON or version-mismatched
      # schemas should not be committed.
      glob: "{packages/schemas/src/**/schema.json,packages/schemas/package.json,scripts/gen-schema-types.ts,scripts/sync-docs-schemas.ts}"
      run: |
        pnpm gen:types && pnpm sync:schemas \
          && git add packages/three-flatland/src/sprites/*.types.gen.ts \
                     tools/io/src/atlas/*.types.gen.ts \
                     docs/public/schemas/*.json
      stage_fixed: true
    check-skia-pin:
      glob: "packages/skia/third_party/skia"
      run: pnpm exec tsx scripts/check-skia-pin.ts
