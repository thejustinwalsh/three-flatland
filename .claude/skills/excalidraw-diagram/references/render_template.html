<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; overflow: hidden; }
    #root { display: inline-block; }
    #root svg { display: block; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    // Pinned to 0.18.0: the unpinned ?bundle 404s on a transitive
    // @braintree/sanitize-url deep path in esm.sh's current build.
    import { exportToSvg } from "https://esm.sh/@excalidraw/excalidraw@0.18.0?bundle";

    // Force ALL Excalidraw text to the docs font (JetBrains Mono). On the docs
    // page, site CSS renders inlined-SVG text in JetBrains Mono regardless of
    // the SVG's own font-family, so the diagram MUST be laid out in JetBrains
    // Mono too — otherwise the baked text positions (computed for Excalidraw's
    // Cascadia) don't match the wider font shown on the page, and labels
    // overflow. Excalidraw force-loads its own fonts, so we delete them and
    // re-add JetBrains Mono under the same family names before exporting.
    let __fontsSwapped = false;
    async function swapInDocsFont() {
      if (__fontsSwapped) return;
      await document.fonts.ready;
      const names = ["Excalifont", "Nunito", "Comic Shanns", "Cascadia", "Virgil", "Helvetica", "Assistant"];
      const kill = [];
      document.fonts.forEach((ff) => {
        const fam = ff.family.replace(/['"]/g, "");
        if (names.includes(fam)) kill.push(ff);
      });
      kill.forEach((ff) => document.fonts.delete(ff));
      for (const n of names) {
        try {
          const f = new FontFace(n, "url('./diagram-font.woff2')");
          await f.load();
          document.fonts.add(f);
        } catch (e) {}
      }
      __fontsSwapped = true;
    }

    window.renderDiagram = async function(jsonData) {
      try {
        await swapInDocsFont();
        const data = typeof jsonData === "string" ? JSON.parse(jsonData) : jsonData;
        const elements = data.elements || [];
        const appState = data.appState || {};
        const files = data.files || {};

        // Force white background in appState
        appState.viewBackgroundColor = appState.viewBackgroundColor || "#ffffff";
        appState.exportWithDarkMode = false;

        const svg = await exportToSvg({
          elements: elements,
          appState: {
            ...appState,
            exportBackground: true,
          },
          files: files,
        });

        // Clear any previous render
        const root = document.getElementById("root");
        root.innerHTML = "";
        root.appendChild(svg);

        window.__renderComplete = true;
        window.__renderError = null;
        return { success: true, width: svg.getAttribute("width"), height: svg.getAttribute("height") };
      } catch (err) {
        window.__renderComplete = true;
        window.__renderError = err.message;
        return { success: false, error: err.message };
      }
    };

    // Signal that the module is loaded and ready
    window.__moduleReady = true;
  </script>
</body>
</html>
