name: Build VS Code Extension VSIX

# REUSABLE workflow (composable): builds the ONE universal VSIX — every
# platform's codelens-service binary + audio-play, all in a single .vsix — and
# uploads it as the `vsix` artifact. `release.yml` calls this on an actual
# @three-flatland/vscode version bump (and then attaches the artifact to a
# GitHub Release); `workflow_dispatch` runs it on demand to grab a build.
#
# It does NOT publish. The extension is `private: true` (npm-invisible;
# versioned via hand-written changesets, same as minis/ and skills/ since
# tools/vscode lives outside packages/). Marketplace publishing is MANUAL:
# download the release asset and run `vsce publish --azure-credential`
# (no PAT) or `ovsx publish` — see tools/vscode/PUBLISHING.md.
#
# One universal VSIX rather than per-platform targets: sidecarManager.ts's
# `${process.platform}-${process.arch}` runtime lookup picks the right
# codelens-service binary at startup, and node-web-audio-api already ships all
# platforms' native binaries in one install — a deliberate size/simplicity
# tradeoff (see scripts/bundle-sidecars.mjs).

on:
  workflow_call:
    inputs:
      ref:
        description: >-
          Exact commit to build. release.yml passes the SHA it published so the
          VSIX matches what npm got; without it each job checks out main's head
          independently and can drift (the release job sits pending approval,
          so main moves under it). Empty = default checkout behaviour.
        type: string
        required: false
        default: ''
    outputs:
      version:
        description: The Marketplace version the VSIX was packaged as (alpha counter folded into patch).
        value: ${{ jobs.assemble-and-package.outputs.version }}
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit/branch/tag to build (default: this workflow's ref)"
        type: string
        required: false
        default: ''

permissions:
  contents: read

# Hardcoded group, NOT ${{ github.workflow }}: when this is CALLED as a reusable
# workflow, github.workflow is the CALLER's name ("Release"), so that expression
# resolved to the release run's own concurrency group — a caller waiting on a job
# that's blocked on the caller's group = deadlock (GitHub cancels the release). A
# fixed prefix keeps the group distinct from any caller while still serializing
# standalone (workflow_dispatch) VSIX builds on the same ref.
concurrency: build-vscode-vsix-${{ github.ref }}

jobs:
  # One native codelens-service build per target platform — Rust can't be
  # cross-compiled reliably for a "just works everywhere" native binary, so
  # each leg builds on its own OS. Each uploads ONLY its own
  # bin/<platform>-<arch>/; audio-play is built once, downstream, in the
  # assemble job (it's platform-independent — building it 6× here is waste).
  # win32-arm64 (Surface/Copilot+ PCs) uses GitHub's native windows-11-arm
  # runner. darwin-x64 (Intel Mac) builds on macos-26-intel — GitHub's current
  # Intel image; the old macos-13 Intel runner was retired (don't switch it back,
  # and don't "simplify" it to a default macos-* label — those are arm64). linux-
  # armhf and alpine (musl) are deliberately not covered: node-web-audio-api
  # ships zero musl prebuilds, so FL Audio can't work there.
  build-codelens-service:
    name: Build codelens-service (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
          - os: macos-26-intel
            target: darwin-x64
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: windows-latest
            target: win32-x64
          - os: windows-11-arm
            target: win32-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          ref: ${{ inputs.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/codelens-service/sidecar
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @three-flatland/vscode

      - name: Build codelens-service
        working-directory: tools/vscode
        run: node scripts/bundle-sidecars.mjs --codelens-only

      - name: Upload codelens-service binary
        uses: actions/upload-artifact@v5
        with:
          name: bin-${{ matrix.target }}
          path: tools/vscode/bin
          retention-days: 1

  # Merges all 6 platforms' codelens-service binaries into one bin/ tree,
  # builds audio-play once, builds the extension + webviews, packages the ONE
  # universal VSIX, and uploads it as the `vsix` artifact.
  assemble-and-package:
    name: Assemble + package universal VSIX
    needs: build-codelens-service
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.mkver.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          ref: ${{ inputs.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Reuse the release's already-built Nx cache (build is the sole writer of the
      # `nx-current` lineage) so `nx build @three-flatland/vscode` below is a cache
      # hit for the extension + its dep closure instead of a cold rebuild.
      - name: Restore Nx cache
        uses: actions/cache/restore@v5
        with:
          path: .nx/cache
          key: ${{ runner.os }}-nx-current-${{ inputs.ref || github.sha }}
          restore-keys: |
            ${{ runner.os }}-nx-current-

      - name: Download all platform codelens-service binaries
        uses: actions/download-artifact@v5
        with:
          pattern: bin-*
          path: tools/vscode/bin
          merge-multiple: true

      - name: Verify all 6 platform binaries are present
        working-directory: tools/vscode
        run: |
          for t in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64 win32-arm64; do
            f="bin/$t/codelens-service"
            case "$t" in win32-*) f="$f.exe" ;; esac
            if [ ! -f "$f" ]; then
              echo "::error::missing $f"
              exit 1
            fi
          done
          echo "all 6 platform binaries present:"
          find bin -type f

      - name: Build audio-play sidecar
        working-directory: tools/vscode
        run: node scripts/bundle-sidecars.mjs --audio-play-only

      # Build the extension AND its workspace-dep closure. The extension's own
      # build script doesn't build @three-flatland/bridge / design-system / io /
      # … — their subpaths (e.g. @three-flatland/bridge/client) resolve to dist
      # for Vite/Rollup, so an unbuilt closure fails the webview build.
      # `nx build @three-flatland/vscode` builds exactly the extension + its nx
      # dependency graph (11 projects, topo order via `dependsOn: ^build`) — it does
      # NOT drag in @three-flatland/skia's Zig/WASM build (skia isn't a dep), so it
      # avoids the toolchain while staying on Nx and reusing the restored cache.
      # (The whole-workspace `nx run-many -t build` WOULD pull in skia; a single
      # project target does not.)
      - name: Build extension + webviews
        run: pnpm nx build @three-flatland/vscode

      # The Marketplace refuses semver prerelease versions, but the repo is in
      # changesets pre-mode (repo-global — no per-package opt-out), so the
      # manifest carries `-alpha.N`. Fold that counter into the patch position
      # so the published version is clean AND strictly increasing. "Alpha" is
      # signalled by `"preview": true` on the listing instead. This rewrite is
      # ephemeral CI state and is never committed — the repo's package.json must
      # keep the real changesets version or the next bump computes wrong.
      # See scripts/vsix-marketplace-version.mjs for the full reasoning.
      - name: Derive the Marketplace version
        id: mkver
        run: |
          V=$(node scripts/vsix-marketplace-version.mjs --write)
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Package universal VSIX
        working-directory: tools/vscode
        run: pnpm run package

      - name: Upload VSIX
        uses: actions/upload-artifact@v5
        with:
          name: vsix
          path: tools/vscode/*.vsix
          retention-days: 90
