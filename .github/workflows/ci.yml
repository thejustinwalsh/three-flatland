name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      examples: ${{ steps.filter.outputs.examples }}
      docs: ${{ steps.filter.outputs.docs }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'packages/**'
              - 'minis/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'tsconfig*.json'
              - 'eslint.config.*'
              - 'vitest.config.*'
            examples:
              - 'examples/**'
              - 'e2e/**'
              - 'playwright.config.*'
            docs:
              - 'docs/**'
            ci:
              - '.github/workflows/**'

  build:
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - node-version: lts/*
            node-tag: current
          - node-version: lts/-1
            node-tag: previous

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ matrix.node-tag }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ matrix.node-tag }}-

      - name: Cache Skia WASM tools
        uses: actions/cache@v5
        with:
          path: packages/skia/.tools
          key: ${{ runner.os }}-skia-tools-${{ hashFiles('packages/skia/package.json') }}
          restore-keys: |
            ${{ runner.os }}-skia-tools-

      - name: Verify package versions
        run: pnpm sync:pack:verify examples minis

      - name: Verify react subpath wrappers
        run: pnpm sync:react:verify

      - name: Verify source VERSION constants
        run: pnpm sync:versions:verify

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm exec turbo run //#lint

      - name: Test
        run: pnpm exec turbo run //#test

      - name: Test Skia
        run: pnpm exec turbo run test --filter=@three-flatland/skia

  smoke:
    name: Smoke tests (examples)
    needs: [changes, build]
    if: |
      !cancelled() && needs.build.result != 'failure' &&
      (needs.changes.outputs.code == 'true' ||
       needs.changes.outputs.examples == 'true' ||
       needs.changes.outputs.docs == 'true' ||
       needs.changes.outputs.ci == 'true')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-current-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-current-

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm test:smoke:install

      - name: Install Playwright system dependencies
        run: pnpm exec playwright install-deps chromium

      - name: Run smoke tests
        run: pnpm test:smoke

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14

  size:
    name: Bundle size
    needs: [changes, build]
    if: |
      github.event_name == 'pull_request' &&
      !cancelled() && needs.build.result != 'failure' &&
      (needs.changes.outputs.code == 'true' || needs.changes.outputs.ci == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-current-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-current-

      - uses: andresz1/size-limit-action@v1.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          build_script: build --filter=./packages/*
          skip_step: install
          package_manager: pnpm
          script: bash -c "if [ -f scripts/size-limit.mjs ]; then node scripts/size-limit.mjs --json; else pnpm exec size-limit --json; fi"

  ci-passed:
    name: CI passed
    if: always()
    needs: [changes, build, smoke, size]
    runs-on: ubuntu-latest
    steps:
      - name: Gate
        run: |
          fail=0
          for job_result in \
              "changes:${{ needs.changes.result }}" \
              "build:${{ needs.build.result }}" \
              "smoke:${{ needs.smoke.result }}" \
              "size:${{ needs.size.result }}"; do
            name="${job_result%%:*}"
            result="${job_result##*:}"
            case "$result" in
              success|skipped) ;;
              *) echo "::error::$name job result: $result"; fail=1 ;;
            esac
          done
          exit $fail
