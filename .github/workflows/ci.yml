name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: read

jobs:
  changes:
    uses: ./.github/workflows/changes.yml

  # Which projects does this PR affect, per the nx graph (transitively)? Lets the
  # heavy per-project jobs run only when actually relevant — e.g. vscode-e2e skips
  # a skia-only PR, since the extension doesn't depend on skia. Reads the graph
  # only (no build, no submodules), so it's ~a minute and off the critical path
  # (vscode-e2e already waits on `build`). Fails OPEN (marks vscode affected) so a
  # graph error never silently skips the e2e.
  affected:
    needs: changes
    if: needs.changes.outputs.changeset_only != 'true'
    runs-on: ubuntu-latest
    outputs:
      vscode: ${{ steps.calc.outputs.vscode }}
      consumers: ${{ steps.calc.outputs.consumers }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - id: calc
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="HEAD~1"
          fi
          # nx is the authority here, the same as it already is for what gets
          # built, typechecked, and tested in build.yml. If it can't answer,
          # that's a blocker to fix — this step fails, the job fails, and the
          # `CI passed` gate blocks the PR. Deliberately NOT swallowed into a
          # run-everything fallback: that would hide a broken graph behind a
          # green check and a permanently inflated CI bill.
          set -euo pipefail
          AFFECTED="$(pnpm nx show projects --affected --base="$BASE")"

          if echo "$AFFECTED" | grep -q '@three-flatland/vscode'; then
            echo "vscode=true" >> "$GITHUB_OUTPUT"
          else
            echo "vscode=false" >> "$GITHUB_OUTPUT"
          fi

          # Consumers whose dependency graph this change touches — the consumer
          # smoke's scope on PRs. Let nx do the selecting: every example declares
          # `tags: ["type:example"]` and every scaffolder template
          # `tags: ["type:template"]`, so this rides declared metadata rather than
          # guessing from the project-name prefix. `create-three-flatland` is named
          # explicitly (its `type:tool` tag is shared with tools that aren't
          # consumers); the smoke maps it onto both scaffold templates.
          CONSUMERS="$(pnpm nx show projects --affected --base="$BASE" \
            --projects=tag:type:example,tag:type:template,create-three-flatland --json \
            | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{const m=s.match(/\[.*\]/s);if(!m){console.error("nx returned no parseable project list");process.exit(1)}process.stdout.write(JSON.parse(m[0]).join(","))})')"
          echo "consumers=$CONSUMERS" >> "$GITHUB_OUTPUT"
          echo "affected consumers: ${CONSUMERS:-<none>}"

  # skia's single `build` target compiles the wasm (setup.mjs --ensure) only on a
  # cache miss (its wasm sources changed) and consumes committed libs otherwise —
  # so the build is self-sufficient and nothing gates the graph on a separate
  # wasm step. The commit-skia-libs job below persists freshly-compiled libs.
  build:
    needs: changes
    if: |
      needs.changes.outputs.changeset_only != 'true' && (
        needs.changes.outputs.packages == 'true' ||
        needs.changes.outputs.minis == 'true' ||
        needs.changes.outputs.examples == 'true' ||
        needs.changes.outputs.docs == 'true' ||
        needs.changes.outputs.configs == 'true' ||
        needs.changes.outputs.vscode == 'true' ||
        needs.changes.outputs.ci == 'true'
      )
    strategy:
      matrix:
        include:
          # Always build on current LTS AND the previous LTS — the hedge that we
          # still work on the last node version.
          - node-version: lts/*
            node-tag: current
          - node-version: lts/-1
            node-tag: previous
    uses: ./.github/workflows/build.yml
    with:
      node-version: ${{ matrix.node-version }}
      node-tag: ${{ matrix.node-tag }}

  # Persist skia's compiled libs. After the build, materialize skia's cached
  # lib/*.wasm (a cache hit unless its wasm sources changed, in which case it
  # compiles once) and commit them back — only when they actually changed.
  # Runs on head_ref so the push targets the PR branch (not the merge ref);
  # GITHUB_TOKEN pushes don't retrigger CI.
  commit-skia-libs:
    needs: [changes, build]
    if: |
      !cancelled() && needs.build.result == 'success' &&
      github.event_name == 'pull_request' &&
      needs.changes.outputs.changeset_only != 'true' &&
      (needs.changes.outputs.packages == 'true' || needs.changes.outputs.ci == 'true')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          submodules: true
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Restore Nx cache
        uses: actions/cache/restore@v6
        with:
          path: .nx/cache
          key: ${{ runner.os }}-nx-current-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nx-current-
      - name: Materialize skia libs (cache hit; compiles only if skia changed)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm nx build @three-flatland/skia
      - name: Commit skia libs if changed
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add packages/skia/lib/skia-gl.wasm packages/skia/lib/skia-wgpu.wasm packages/skia/lib/.wasm-sources.sha256
          if git diff --cached --quiet; then
            echo "skia libs unchanged — nothing to commit"
          else
            git commit -m "chore(skia): rebuild wasm libs [skip ci]"
            git push origin "HEAD:$BRANCH"
          fi

  smoke:
    needs: [changes, build]
    if: |
      !cancelled() && needs.build.result != 'failure' &&
      needs.changes.outputs.changeset_only != 'true' &&
      (needs.changes.outputs.packages == 'true' ||
       needs.changes.outputs.minis == 'true' ||
       needs.changes.outputs.examples == 'true' ||
       needs.changes.outputs.docs == 'true' ||
       needs.changes.outputs.configs == 'true' ||
       needs.changes.outputs.ci == 'true')
    uses: ./.github/workflows/smoke.yml

  # The smoke test — real published-package consumer flow. Runs ONLY after every
  # package build is green (needs: build); it restores the build job's Nx cache
  # (which carries skia's lib/*.wasm as a build output) instead of rebuilding.
  #
  # Consumers are the examples AND the projects `create-three-flatland` scaffolds:
  # a scaffolded starter is just another consumer that installs our published
  # packages by declared range, so it rides the same Verdaccio harness rather than
  # a second job with its own (weaker, `file:`-based) install path.
  #
  # On PRs this is scoped to what `nx affected` says the change can reach, so a
  # skia-only change render-tests the 2 skia examples instead of all 22, and a
  # template-only change tests just the scaffolds. The release runs the same
  # script UNSCOPED (release.yml, as a step inside the approved job) so the full
  # surface is still swept before anything is published — that's the net for an
  # accidental break the graph didn't predict.
  #
  # No affected consumers means nothing this change can break, so the job is
  # skipped and the gate treats that as a pass. If `affected` itself failed,
  # nx couldn't answer — that job fails, the gate blocks the PR, and we fix the
  # graph rather than papering over it with a full sweep.
  consumer-smoke:
    needs: [changes, build, affected]
    if: |
      !cancelled() && needs.build.result == 'success' &&
      needs.changes.outputs.changeset_only != 'true' &&
      (needs.changes.outputs.packages == 'true' ||
       needs.changes.outputs.examples == 'true' ||
       needs.changes.outputs.configs == 'true' ||
       needs.changes.outputs.ci == 'true') &&
      needs.affected.outputs.consumers != ''
    uses: ./.github/workflows/consumer-smoke.yml
    with:
      consumers: ${{ needs.affected.outputs.consumers }}

  size:
    needs: [changes, build]
    if: |
      github.event_name == 'pull_request' &&
      !cancelled() && needs.build.result != 'failure' &&
      needs.changes.outputs.changeset_only != 'true' &&
      (needs.changes.outputs.packages == 'true' ||
       needs.changes.outputs.configs == 'true' ||
       needs.changes.outputs.ci == 'true')
    uses: ./.github/workflows/size.yml
    secrets: inherit

  # Gated on the nx-affected result, not a coarse `packages` filter: the 30-min
  # e2e runs only when @three-flatland/vscode (or one of its transitive deps) is
  # affected, or a CI change touches it. If nx can't answer, `affected` fails and
  # the gate blocks the PR — no fall back to running it anyway, which would hide
  # the broken graph.
  vscode-e2e:
    needs: [changes, build, affected]
    if: |
      !cancelled() && needs.build.result != 'failure' &&
      needs.changes.outputs.changeset_only != 'true' &&
      (needs.affected.outputs.vscode == 'true' ||
       needs.changes.outputs.ci == 'true')
    uses: ./.github/workflows/vscode-e2e.yml

  # Changeset generation is DISABLED (2026-07-20): the generator exhausted its
  # model tokens and failed. Changesets are hand-written now — whoever changes a
  # package commits one with it (see .changeset/README.md). The reusable
  # workflow still exists at .github/workflows/changeset.yml; restore by adding
  # a `changeset:` job here that calls it. It never gated `ci-passed`.

  ci-passed:
    name: CI passed
    if: always()
    needs: [changes, affected, build, smoke, size, vscode-e2e, consumer-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Gate
        run: |
          fail=0
          for job_result in \
              "changes:${{ needs.changes.result }}" \
              "affected:${{ needs.affected.result }}" \
              "build:${{ needs.build.result }}" \
              "smoke:${{ needs.smoke.result }}" \
              "size:${{ needs.size.result }}" \
              "vscode-e2e:${{ needs.vscode-e2e.result }}" \
              "consumer-smoke:${{ needs.consumer-smoke.result }}"; do
            name="${job_result%%:*}"
            result="${job_result##*:}"
            case "$result" in
              success|skipped) ;;
              *) echo "::error::$name job result: $result"; fail=1 ;;
            esac
          done
          exit $fail
