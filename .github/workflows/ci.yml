name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: read

jobs:
  changes:
    uses: ./.github/workflows/changes.yml

  # Compile skia's WASM (setup.mjs --ensure: patch + GN + source-gen + zig +
  # wasm-opt) ONLY when its native inputs change, commit lib/*.wasm back to the
  # branch (GITHUB_TOKEN pushes don't retrigger CI), and upload them so the same
  # run's build/smoke consume the fresh libs. When skia inputs are unchanged this
  # skips and the committed libs are reused. See commit-artifact.yml.
  skia-wasm:
    needs: changes
    if: |
      !cancelled() &&
      needs.changes.outputs.changeset_only != 'true' &&
      (needs.changes.outputs.skia_native == 'true' ||
       needs.changes.outputs.ci == 'true')
    permissions:
      contents: write
    uses: ./.github/workflows/commit-artifact.yml
    with:
      project: '@three-flatland/skia'
      target: 'build:wasm'
      artifact-paths: 'packages/skia/lib'
      artifact-name: 'skia-wasm'
      setup-zig: true

  build:
    needs: [changes, skia-wasm]
    if: |
      !cancelled() && needs.skia-wasm.result != 'failure' &&
      needs.changes.outputs.changeset_only != 'true' && (
        needs.changes.outputs.packages == 'true' ||
        needs.changes.outputs.minis == 'true' ||
        needs.changes.outputs.examples == 'true' ||
        needs.changes.outputs.docs == 'true' ||
        needs.changes.outputs.configs == 'true' ||
        needs.changes.outputs.vscode == 'true' ||
        needs.changes.outputs.ci == 'true'
      )
    strategy:
      matrix:
        include:
          # Always build on current LTS AND the previous LTS — the hedge that we
          # still work on the last node version.
          - node-version: lts/*
            node-tag: current
          - node-version: lts/-1
            node-tag: previous
    uses: ./.github/workflows/build.yml
    with:
      node-version: ${{ matrix.node-version }}
      node-tag: ${{ matrix.node-tag }}

  smoke:
    needs: [changes, build]
    if: |
      !cancelled() && needs.build.result != 'failure' &&
      needs.changes.outputs.changeset_only != 'true' &&
      (needs.changes.outputs.packages == 'true' ||
       needs.changes.outputs.minis == 'true' ||
       needs.changes.outputs.examples == 'true' ||
       needs.changes.outputs.docs == 'true' ||
       needs.changes.outputs.configs == 'true' ||
       needs.changes.outputs.ci == 'true')
    uses: ./.github/workflows/smoke.yml

  # The smoke test — real published-package consumer flow. Runs ONLY after every
  # package build is green (needs: build) and skia's libs are ready (skia-wasm),
  # and restores the build job's Nx cache instead of rebuilding.
  consumer-smoke:
    needs: [changes, skia-wasm, build]
    if: |
      !cancelled() && needs.build.result == 'success' &&
      needs.skia-wasm.result != 'failure' &&
      needs.changes.outputs.changeset_only != 'true' &&
      (needs.changes.outputs.packages == 'true' ||
       needs.changes.outputs.examples == 'true' ||
       needs.changes.outputs.configs == 'true' ||
       needs.changes.outputs.ci == 'true')
    uses: ./.github/workflows/consumer-smoke.yml

  size:
    needs: [changes, build]
    if: |
      github.event_name == 'pull_request' &&
      !cancelled() && needs.build.result != 'failure' &&
      needs.changes.outputs.changeset_only != 'true' &&
      (needs.changes.outputs.packages == 'true' ||
       needs.changes.outputs.configs == 'true' ||
       needs.changes.outputs.ci == 'true')
    uses: ./.github/workflows/size.yml
    secrets: inherit

  vscode-e2e:
    needs: [changes, build]
    if: |
      !cancelled() && needs.build.result != 'failure' &&
      needs.changes.outputs.changeset_only != 'true' &&
      (needs.changes.outputs.vscode == 'true' ||
       needs.changes.outputs.packages == 'true' ||
       needs.changes.outputs.ci == 'true')
    uses: ./.github/workflows/vscode-e2e.yml

  # Generate the release changeset only AFTER the gate jobs pass, as the final
  # step of CI rather than a parallel workflow. Sequencing it here means the
  # bot's `ci: generate changesets` commit is created on an already-green base —
  # so its own CI run instapasses via the changeset-only skip, and because this
  # PR's CI is finished by then, that run cancels nothing (cancel-in-progress
  # stays safe). Not a dependency of `ci-passed`: changeset generation is
  # best-effort and never gates merge.
  changeset:
    needs: [changes, build, smoke, size, vscode-e2e, consumer-smoke]
    if: |
      github.event_name == 'pull_request' &&
      needs.changes.outputs.changeset_only != 'true' &&
      needs.build.result == 'success' &&
      needs.smoke.result != 'failure' &&
      needs.size.result != 'failure' &&
      needs.vscode-e2e.result != 'failure' &&
      needs.consumer-smoke.result != 'failure'
    uses: ./.github/workflows/changeset.yml
    secrets: inherit

  ci-passed:
    name: CI passed
    if: always()
    needs: [changes, build, smoke, size, vscode-e2e, consumer-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Gate
        run: |
          fail=0
          for job_result in \
              "changes:${{ needs.changes.result }}" \
              "build:${{ needs.build.result }}" \
              "smoke:${{ needs.smoke.result }}" \
              "size:${{ needs.size.result }}" \
              "vscode-e2e:${{ needs.vscode-e2e.result }}" \
              "consumer-smoke:${{ needs.consumer-smoke.result }}"; do
            name="${job_result%%:*}"
            result="${job_result##*:}"
            case "$result" in
              success|skipped) ;;
              *) echo "::error::$name job result: $result"; fail=1 ;;
            esac
          done
          exit $fail
