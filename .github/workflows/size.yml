name: Size

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if latest commit has build-relevant changes
        id: latest-commit
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files in latest commit:"
          echo "$changed"
          if echo "$changed" | grep -qvE '^(\.changeset/|\.claude/|docs/|scripts/|.*\.md$|LICENSE$)'; then
            echo "has_code=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_code=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide whether to run size check
        id: decide
        run: |
          if [[ "${{ steps.latest-commit.outputs.has_code }}" == "false" ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping size check — no code changes in latest commit"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Size check required"
          fi

  size:
    needs: changes
    if: needs.changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Cache Skia WASM tools
        uses: actions/cache@v4
        with:
          path: packages/skia/.tools
          key: ${{ runner.os }}-skia-tools-${{ hashFiles('packages/skia/package.json') }}
          restore-keys: |
            ${{ runner.os }}-skia-tools-

      - uses: andresz1/size-limit-action@v1.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          build_script: build --filter=./packages/*
          skip_step: install
          package_manager: pnpm
          script: bash -c "if [ -f scripts/size-limit.mjs ]; then node scripts/size-limit.mjs --json; else pnpm exec size-limit --json; fi"
