name: Size

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

jobs:
  size:
    name: Bundle size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: pnpm

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - run: pnpm install --frozen-lockfile

      - name: Cache Nx
        uses: actions/cache@v5
        with:
          path: .nx/cache
          key: ${{ runner.os }}-nx-current-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nx-current-

      - uses: andresz1/size-limit-action@v1.8.0
        # The build this action runs downloads the skia WASM toolchain from the
        # GitHub releases API (packages/skia/scripts/setup.mjs). Expose the token
        # so those requests are authenticated (5,000/hr) instead of hitting the
        # shared-runner unauthenticated cap (60/hr) and failing with "Available:
        # none". Unlike the build job, size has no skia-tools cache to fall back
        # on, so it always downloads fresh.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # size-limit-action runs this script against BOTH the PR branch and the
          # base branch to compute the delta, so it must be a script name that
          # exists on both. The base is pre-nx (turbo), so a packages-only nx
          # script (`-p 'packages/*'`) doesn't exist there — plain `build` resolves
          # on both (turbo's build on base, nx's on the PR). Narrowing to packages/*
          # is a post-merge follow-up (once nx is on main).
          build_script: build
          skip_step: install
          package_manager: pnpm
          script: bash -c "if [ -f scripts/size-limit.mjs ]; then node scripts/size-limit.mjs --json; else pnpm exec size-limit --json; fi"
