name: Size

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

jobs:
  size:
    name: Bundle size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: pnpm

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-current-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-current-

      - uses: andresz1/size-limit-action@v1.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          build_script: build --filter=./packages/*
          skip_step: install
          package_manager: pnpm
          script: bash -c "if [ -f scripts/size-limit.mjs ]; then node scripts/size-limit.mjs --json; else pnpm exec size-limit --json; fi"
