name: Deploy Docs

on:
  push:
    branches: [main]
    paths-ignore:
      - '.changeset/**'
      - '.claude/**'
      - 'scripts/**'
      - 'LICENSE'
      - '*.md'
      - '**/CHANGELOG.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  changes:
    uses: ./.github/workflows/changes.yml

  smoke:
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.packages == 'true' ||
      needs.changes.outputs.minis == 'true' ||
      needs.changes.outputs.examples == 'true' ||
      needs.changes.outputs.docs == 'true' ||
      needs.changes.outputs.configs == 'true' ||
      needs.changes.outputs.ci == 'true'
    uses: ./.github/workflows/smoke.yml

  build-pages:
    needs: smoke
    if: needs.smoke.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: pnpm

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-current-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-current-

      - name: Build docs
        run: pnpm build --filter=docs

      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs/dist

  deploy:
    needs: build-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
