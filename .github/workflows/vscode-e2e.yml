name: VSCode E2E

on:
  workflow_call:

jobs:
  vscode-e2e:
    name: VS Code extension e2e (xvfb)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # tools/codelens-service's Rust sidecar doesn't exist on this branch
      # yet (lands via a separate branch) — this step is a guarded no-op
      # until it merges, so this workflow doesn't need editing again when
      # it does. The extension's e2e build step itself doesn't currently
      # depend on the sidecar binary being present; this just makes sure
      # it's built before e2e runs once that dependency exists.
      - name: Check for codelens-service Rust sidecar
        id: codelens
        run: |
          if [ -d tools/codelens-service/sidecar ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Rust toolchain
        if: steps.codelens.outputs.present == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        if: steps.codelens.outputs.present == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/codelens-service/sidecar

      - name: Build codelens-service sidecar
        if: steps.codelens.outputs.present == 'true'
        run: cargo build --release
        working-directory: tools/codelens-service/sidecar

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-current-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-current-

      # ~264 MB per VS Code build. downloadAndUnzipVSCode resolves "stable"
      # to a concrete build on every call and only re-downloads when that
      # resolved build isn't already on disk, so a static cache key is safe
      # long-term — a new stable release just adds a new subfolder under
      # this path rather than invalidating the whole cache.
      - name: Cache VS Code test download
        uses: actions/cache@v5
        with:
          path: tools/vscode/.vscode-test
          key: ${{ runner.os }}-vscode-test-stable
          restore-keys: |
            ${{ runner.os }}-vscode-test-

      # ubuntu-latest runners have no sound hardware and no audio device is
      # configured by default -- xvfb (above) virtualizes the DISPLAY only.
      # node-web-audio-api (tools/audio-play's sidecar, via Rust's cpal,
      # which uses ALSA on Linux) needs somewhere to actually open a
      # device; with nothing present, PlaySidecarClient-backed tests that
      # wait on real audio output (stats.playing, decoded .wav/song/synth
      # playback) either time out or the sidecar itself fails during
      # AudioContext construction. A PulseAudio null sink gives ALSA's
      # `pulse` plugin a real, functioning (silent) default device to open
      # -- the standard fix for headless Web Audio API testing in CI (the
      # same approach Chromium/Playwright's own CI uses).
      - name: Set up a virtual audio device (PulseAudio null sink)
        run: |
          sudo apt-get update
          sudo apt-get install -y pulseaudio
          pulseaudio -D --exit-idle-time=-1 --disallow-exit
          # `-D` forks and returns as soon as the daemon PROCESS exists, not
          # once it's actually ready to accept connections -- racing pactl
          # (here) or the real sidecar's first AudioContext open (later, in
          # the actual e2e run) against that startup window is the
          # documented source of intermittent stats.silent/stats.peak
          # failures under a loaded runner (tools/audio-play/CLAUDE.md,
          # "Common pitfalls" -- "PulseAudio null sink is not perfectly
          # reliable under CI load"). Poll for real readiness instead of
          # assuming the fork already means ready.
          for i in $(seq 1 30); do
            pactl info >/dev/null 2>&1 && break
            sleep 0.5
          done
          pactl info >/dev/null 2>&1 || { echo "::error::pulseaudio did not become ready within 15s"; exit 1; }
          pactl load-module module-null-sink sink_name=DummyOutput
          pactl set-default-sink DummyOutput
          # Same readiness concern one level down: the null sink module was
          # just requested, not necessarily fully attached and routable the
          # instant `load-module` returns. Confirm it's actually the
          # default sink and enumerable before trusting ALSA's `pulse`
          # plugin can open it.
          for i in $(seq 1 20); do
            pactl get-default-sink 2>/dev/null | grep -q DummyOutput && break
            sleep 0.25
          done
          pactl get-default-sink 2>/dev/null | grep -q DummyOutput || { echo "::error::DummyOutput sink did not become the default sink in time"; exit 1; }

      # xvfb ships preinstalled on the ubuntu-latest runner image — this is
      # the same minimal invocation as microsoft/vscode-test's own sample CI
      # workflow (github.com/microsoft/vscode-test/blob/main/sample/.github/
      # workflows/ci.yml): no extra system packages needed on top of it.
      #
      # Wrapped in a job-level retry (not relying on Playwright's own
      # in-process test retry alone): tools/audio-play/CLAUDE.md documents
      # residual PulseAudio/ALSA jitter under a loaded runner even with the
      # daemon confirmed ready (see the readiness wait above) — real,
      # occasional silence on an otherwise-correct audio path, not a
      # deterministic bug (confirmed: workers: 1 below rules out cross-test
      # audio contention, and which specific test catches it varies run to
      # run). Playwright's own retry reuses the SAME already-running VS
      # Code instance and sidecar process for its retry attempt, so it
      # can't shake a glitch tied to that process's audio state; retrying
      # the whole step gets a genuinely fresh xvfb + VS Code + sidecar +
      # AudioContext each attempt, which is a materially stronger reset.
      - name: Run VS Code extension e2e tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 2
          command: xvfb-run -a pnpm --filter @three-flatland/vscode test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: vscode-e2e-report
          path: tools/vscode/e2e/playwright-report/
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: vscode-e2e-traces
          path: tools/vscode/e2e/test-results/
          retention-days: 14
