name: VSCode E2E

on:
  workflow_call:

jobs:
  vscode-e2e:
    name: VS Code extension e2e (xvfb)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # tools/codelens-service's Rust sidecar doesn't exist on this branch
      # yet (lands via a separate branch) — this step is a guarded no-op
      # until it merges, so this workflow doesn't need editing again when
      # it does. The extension's e2e build step itself doesn't currently
      # depend on the sidecar binary being present; this just makes sure
      # it's built before e2e runs once that dependency exists.
      - name: Check for codelens-service Rust sidecar
        id: codelens
        run: |
          if [ -d tools/codelens-service/sidecar ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Rust toolchain
        if: steps.codelens.outputs.present == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        if: steps.codelens.outputs.present == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/codelens-service/sidecar

      - name: Build codelens-service sidecar
        if: steps.codelens.outputs.present == 'true'
        run: cargo build --release
        working-directory: tools/codelens-service/sidecar

      - name: Restore Nx cache
        uses: actions/cache/restore@v6
        with:
          path: .nx/cache
          key: ${{ runner.os }}-nx-current-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nx-current-

      # ~264 MB per VS Code build, keyed to the CONCRETE stable version so the
      # cache rotates when VS Code releases. The previous static key
      # ("…-vscode-test-stable") rotted silently: actions/cache saves only on
      # a primary-key MISS, so once that key existed, each newly released
      # stable was downloaded during the run and thrown away at save time —
      # every run after a VS Code release re-downloaded 295 MB inside the
      # vscodeInstallPath fixture's clock (the 60s setup-timeout flake).
      # If the resolve fails, "stable" degrades to the old behavior instead
      # of failing the job; the fixture's own download budget covers it.
      - name: Resolve current VS Code stable
        id: vsver
        run: |
          V=$(curl -fsSL --retry 3 https://update.code.visualstudio.com/api/releases/stable \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
          echo "version=${V:-stable}" >> "$GITHUB_OUTPUT"
          echo "current stable: ${V:-stable}"

      - name: Cache VS Code test download
        uses: actions/cache@v6
        with:
          path: tools/vscode/.vscode-test
          key: ${{ runner.os }}-vscode-test-${{ steps.vsver.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-vscode-test-

      # Determinism redesign (planning/testing/test-determinism-audit.md):
      # no PulseAudio/virtual-audio-device setup here anymore. The one
      # audibility proof for the whole audio e2e suite
      # (specs/audio-render-gate.spec.ts) renders through an
      # `OfflineAudioContext`, which never opens a real output stream and
      # so has nothing to do with whatever sound hardware (or lack of it)
      # this runner has. Every other audio spec only proves lens wiring
      # and "does the command dispatch without throwing" — also
      # device-independent. xvfb ships preinstalled on the ubuntu-latest
      # runner image — this is the same minimal invocation as
      # microsoft/vscode-test's own sample CI workflow
      # (github.com/microsoft/vscode-test/blob/main/sample/.github/
      # workflows/ci.yml): no extra system packages needed on top of it.
      #
      # No job-level retry either: a retry re-running the SAME
      # already-warm shared window/sidecars can mask a genuine
      # first-attempt failure rather than proving anything was flaky. Run
      # once; if this suite is red, that's a real signal.
      - name: Run VS Code extension e2e tests
        run: xvfb-run -a pnpm --filter @three-flatland/vscode test:e2e

      # Keep only the resolved version's install before the post-job cache
      # save — restore-keys can restore an older build alongside the fresh
      # download, and without pruning each version bump would snowball
      # another ~264 MB into every new cache entry.
      - name: Prune stale VS Code builds from the cache dir
        if: always() && steps.vsver.outputs.version != 'stable'
        run: |
          find tools/vscode/.vscode-test -maxdepth 1 -type d -name 'vscode-*' \
            ! -name "*-${{ steps.vsver.outputs.version }}" -print -exec rm -rf {} + 2>/dev/null || true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: vscode-e2e-report
          path: tools/vscode/e2e/playwright-report/
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: vscode-e2e-traces
          path: tools/vscode/e2e/test-results/
          retention-days: 14
