name: Changes

on:
  workflow_call:
    outputs:
      packages:
        value: ${{ jobs.detect.outputs.packages }}
      minis:
        value: ${{ jobs.detect.outputs.minis }}
      examples:
        value: ${{ jobs.detect.outputs.examples }}
      docs:
        value: ${{ jobs.detect.outputs.docs }}
      configs:
        value: ${{ jobs.detect.outputs.configs }}
      ci:
        value: ${{ jobs.detect.outputs.ci }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.filter.outputs.packages }}
      minis: ${{ steps.filter.outputs.minis }}
      examples: ${{ steps.filter.outputs.examples }}
      docs: ${{ steps.filter.outputs.docs }}
      configs: ${{ steps.filter.outputs.configs }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            packages:
              - 'packages/**'
            minis:
              - 'minis/**'
            examples:
              - 'examples/**'
              - 'e2e/**'
              - 'playwright.config.*'
            docs:
              - 'docs/**'
            configs:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'tsconfig*.json'
              - 'eslint.config.*'
              - 'vitest.config.*'
            ci:
              - '.github/workflows/**'
