name: Release

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Cache Skia WASM tools
        uses: actions/cache@v4
        with:
          path: packages/skia/.tools
          key: ${{ runner.os }}-skia-tools-${{ hashFiles('packages/skia/package.json') }}
          restore-keys: |
            ${{ runner.os }}-skia-tools-

      - name: Build
        run: pnpm build

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm changeset:version
          title: 'chore: release packages'
          commit: 'chore: release packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          NPM_CONFIG_ACCESS: public

      - name: Sync alpha dist-tag
        if: always() && steps.changesets.conclusion == 'success'
        run: |
          # Pass 1: trust the action's output for packages published this run
          # (avoids registry read-after-write lag racing with the fresh publish).
          if [ "${{ steps.changesets.outputs.published }}" = "true" ]; then
            echo '${{ steps.changesets.outputs.publishedPackages }}' \
              | node -e "process.stdin.on('data',d=>JSON.parse(d).forEach(p=>console.log(p.name+' '+p.version)))" \
              | while read pkg version; do
                  echo "$version" | grep -q alpha || continue
                  echo "Tagging freshly published $pkg@$version as alpha"
                  npm dist-tag add "$pkg@$version" alpha || true
                done
          fi

          # Pass 2: self-heal drift for any non-ignored workspace package.
          # Source of truth for the publish set is .changeset/config.json ignore[].
          mapfile -t packages < <(
            node -e "
              const cfg = require('./.changeset/config.json');
              const ignore = new Set(cfg.ignore || []);
              const { execSync } = require('child_process');
              const ws = JSON.parse(execSync('pnpm -r list --depth=-1 --json'));
              for (const p of ws) {
                if (!p.name || p.private) continue;
                if (ignore.has(p.name)) continue;
                console.log(p.name);
              }
            "
          )
          for pkg in "${packages[@]}"; do
            tags=$(npm view "$pkg" dist-tags --json 2>/dev/null) || continue
            latest=$(echo "$tags" | node -e "let d=''; process.stdin.on('data',c=>d+=c).on('end',()=>{const t=JSON.parse(d||'{}'); console.log(t.latest||'')})")
            alpha=$(echo  "$tags" | node -e "let d=''; process.stdin.on('data',c=>d+=c).on('end',()=>{const t=JSON.parse(d||'{}'); console.log(t.alpha||'')})")
            [ -z "$latest" ] && continue
            echo "$latest" | grep -q alpha || continue
            [ "$latest" = "$alpha" ] && continue
            echo "Healing drift: $pkg alpha=$alpha -> $latest"
            npm dist-tag add "$pkg@$latest" alpha || true
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
