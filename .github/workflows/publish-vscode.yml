name: Publish VS Code Extension

# @three-flatland/vscode is `private: true` (see tools/vscode/package.json)
# so it's invisible to changesets' own npm-publish step in release.yml —
# it's versioned/changelogged there (hand-written changesets, same
# convention this repo already uses for minis/ and skills/, since
# tools/vscode lives outside packages/ and changeset:generate's
# discoverPackages() only scans that directory), but publishing the VSIX
# itself is a completely different mechanism (vsce/ovsx, not npm) with
# its own multi-platform native-binary build story — hence this separate
# workflow instead of folding it into release.yml's single ubuntu-latest
# job.
#
# Ships ONE universal VSIX with every platform's codelens-service binary
# bundled in — mirrors how audio-play's own node-web-audio-api dependency
# already ships all 7 platforms' native binaries in a single npm install.
# sidecarManager.ts's `${process.platform}-${process.arch}` runtime
# lookup already picks the right one at startup with zero code changes.
# Simpler to build and publish than per-platform VSIX targets, at the
# cost of a bigger download for every user — a deliberate tradeoff, not
# an oversight (see scripts/bundle-sidecars.mjs's own doc comment).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'tools/vscode/package.json'

permissions:
  contents: read

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  # Guards the whole workflow on an ACTUAL version bump, not just any
  # push that happens to touch package.json (a metadata-only edit, e.g.
  # tightening `keywords`, would otherwise re-trigger a full 6-platform
  # build + republish attempt — --skip-duplicate downstream would no-op
  # it, but that's an expensive, slow way to find out). Compares the
  # local package.json version against what's live on the marketplace;
  # `vsce show` no-ops (exit 0, empty output) for an extension that isn't
  # published yet, which the first-ever run here will be.
  check-version:
    name: Check for a new version
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies (tools/vscode only)
        run: pnpm install --frozen-lockfile --filter @three-flatland/vscode

      - name: Compare local version against published
        id: check
        working-directory: tools/vscode
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          echo "version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"

          PUBLISHED_VERSION=$(npx vsce show three-flatland.tools --json 2>/dev/null | node -p "
            try { JSON.parse(require('fs').readFileSync(0, 'utf8')).versions[0].version } catch { '' }
          " 2>/dev/null || echo "")

          echo "local=$LOCAL_VERSION published=$PUBLISHED_VERSION"
          if [ "$LOCAL_VERSION" != "$PUBLISHED_VERSION" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

  # One native codelens-service build per target platform — Rust can't be
  # cross-compiled reliably for a "just works everywhere" native binary,
  # so each leg builds on its own OS rather than attempting
  # cross-compilation from one runner. Each leg uploads ONLY its own
  # bin/<platform>-<arch>/ — audio-play is built once, downstream, in the
  # assemble job, since it's genuinely platform-independent and building
  # it 6× here would be pure waste.
  #
  # win32-arm64 (Surface/Copilot+ PCs) uses GitHub's native windows-11-arm
  # runner (GA), same "native runner per arch" pattern as linux-arm64 — no
  # cross-compilation there either. node-web-audio-api already ships a
  # win32-arm64-msvc prebuild, so audio-play needed no changes for this.
  # linux-armhf (32-bit ARM) and alpine-x64/alpine-arm64 (musl) are
  # deliberately NOT covered: armhf is a vanishingly niche desktop-tool
  # audience, and node-web-audio-api ships zero musl prebuilds at all — FL
  # Audio couldn't work under Alpine regardless of what we build here.
  build-codelens-service:
    name: Build codelens-service (${{ matrix.target }})
    needs: check-version
    if: needs.check-version.outputs.should_publish == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
          - os: macos-13
            target: darwin-x64
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: windows-latest
            target: win32-x64
          - os: windows-11-arm
            target: win32-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/codelens-service/sidecar
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @three-flatland/vscode

      - name: Build codelens-service
        working-directory: tools/vscode
        run: node scripts/bundle-sidecars.mjs --codelens-only

      - name: Upload codelens-service binary
        uses: actions/upload-artifact@v5
        with:
          name: bin-${{ matrix.target }}
          path: tools/vscode/bin
          retention-days: 1

  # Merges all five platforms' codelens-service binaries into one bin/
  # tree, builds audio-play once, builds the extension + webviews, and
  # packages the ONE universal VSIX everyone gets published.
  assemble-and-package:
    name: Assemble + package universal VSIX
    needs: [check-version, build-codelens-service]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download all platform codelens-service binaries
        uses: actions/download-artifact@v5
        with:
          pattern: bin-*
          path: tools/vscode/bin
          merge-multiple: true

      - name: Verify all 6 platform binaries are present
        working-directory: tools/vscode
        run: |
          for t in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64 win32-arm64; do
            f="bin/$t/codelens-service"
            case "$t" in win32-*) f="$f.exe" ;; esac
            if [ ! -f "$f" ]; then
              echo "::error::missing $f"
              exit 1
            fi
          done
          echo "all 6 platform binaries present:"
          find bin -type f

      - name: Build audio-play sidecar
        working-directory: tools/vscode
        run: node scripts/bundle-sidecars.mjs --audio-play-only

      - name: Build extension + webviews
        run: pnpm --filter @three-flatland/vscode build

      - name: Package universal VSIX
        working-directory: tools/vscode
        run: pnpm run package

      - name: Upload VSIX
        uses: actions/upload-artifact@v5
        with:
          name: vsix
          path: tools/vscode/*.vsix
          retention-days: 14

  publish:
    name: Publish to VS Code Marketplace + Open VSX
    needs: [check-version, assemble-and-package]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      # Azure DevOps Personal Access Tokens are END OF LIFE — the VS Code
      # Marketplace publish uses Microsoft Entra ID instead (see the
      # `--azure-credential` step below). `id-token: write` lets `azure/login`
      # mint a short-lived OIDC federated token, so there is NO long-lived
      # secret to store or rotate. `contents: read` is for the checkout.
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies (tools/vscode only)
        run: pnpm install --frozen-lockfile --filter @three-flatland/vscode

      - name: Download the universal VSIX
        uses: actions/download-artifact@v5
        with:
          name: vsix
          path: tools/vscode

      - name: List downloaded package
        run: ls -la tools/vscode/*.vsix

      # Microsoft Entra ID auth — Azure DevOps PATs (the old `VSCE_PAT`) are
      # end of life, so `vsce publish` authenticates via Entra instead.
      # OIDC federated credential: the Entra app registration trusts this
      # repo's `release` environment, so nothing is stored here — GitHub
      # mints a short-lived token per run. `az login` establishes the
      # credential that `vsce publish --azure-credential` (via
      # @azure/identity) exchanges for an Azure DevOps access token.
      # `allow-no-subscriptions` because publishing touches no Azure
      # subscription/ARM — the service principal only needs to be a member
      # of the `three-flatland` Marketplace publisher (see PUBLISHING.md).
      - name: Azure login (Entra ID via OIDC — no PAT)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      # --skip-duplicate: idempotent re-runs (a retried job, or this
      # workflow re-triggering on an unrelated package.json edit that
      # didn't actually change the version) fail silently instead of
      # erroring, matching check-version's own guard rather than fighting
      # it if both somehow both let a run through.
      - name: Publish to VS Code Marketplace
        working-directory: tools/vscode
        run: npx vsce publish --azure-credential --packagePath *.vsix --skip-duplicate

      - name: Publish to Open VSX
        working-directory: tools/vscode
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish --packagePath *.vsix --skip-duplicate
