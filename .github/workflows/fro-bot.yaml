name: Fro Bot

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  discussion_comment:
    types: [created]
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, review_requested]
  schedule:
    - cron: '30 15 * * *'
  workflow_dispatch:
    inputs:
      prompt:
        description: Custom prompt for the Fro Bot agent
        required: true

permissions:
  contents: read

concurrency:
  group: >-
    fro-bot-${{
      github.event.issue.number ||
      github.event.pull_request.number ||
      github.event.discussion.number ||
      github.run_id
    }}
  cancel-in-progress: false

env:
  PR_REVIEW_PROMPT: |
    Review this pnpm/Turbo TypeScript monorepo with the same standards as CI.

    Focus on:
    - Correctness and edge cases
    - Security implications
    - Breaking changes to public APIs in packages/*
    - Regressions in docs, examples, minis, and generated sync files
    - Test coverage for new/changed behavior
    - Whether package/version sync or React subpath wrappers need regeneration

    This repo's own CI (ci.yml) already runs build, typecheck, lint, the
    full test suite, smoke tests, and every sync:*:verify check in
    parallel for this exact PR and reports each as a named status check —
    check those results first (gh pr checks <number>, or the PR's Checks
    tab) rather than re-running any of them yourself. Re-running a cold
    pnpm build alone costs 20-25+ minutes on a large PR, which starves the
    time you actually need for reading and reasoning about the diff — the
    part of this review only you can do. Only run one of the commands
    below yourself to investigate a SPECIFIC question CI's pass/fail
    signal doesn't answer (e.g. why one particular type error occurs, not
    a blanket re-verification pass):
    - pnpm sync:pack:verify examples minis packages/create-three-flatland/templates
    - pnpm sync:react:verify
    - pnpm sync:versions:verify
    - pnpm lint
    - pnpm typecheck
    - pnpm build
    - pnpm test
    - pnpm --filter @three-flatland/skia test
    - pnpm test:smoke

    Do NOT push commits, modify code, or create branches. Review only.
    Use inline comments for file-specific issues. Reserve the review body
    for the structured summary below.

    You MUST structure your review using exactly these headings:
    ## Verdict: [PASS | CONDITIONAL | REJECT]
    CONDITIONAL = can merge after addressing the listed blocking issues.
    ### Blocking issues
    ### Non-blocking concerns
    ### Missing tests
    ### Risk assessment (LOW/MED/HIGH) + rationale
    Evaluate likelihood of regression, security exposure, or blast radius.
    If a section has no items, write "None" under the heading.
    Do not omit any heading.

  SCHEDULE_PROMPT: |
    Perform daily maintenance for this pnpm/Turbo TypeScript monorepo and update
    a SINGLE rolling issue titled "Daily Maintenance Report" in this repository.

    Search for an issue with this exact title. If multiple matches exist,
    use the most recently updated one. If no open issue exists, create it.
    If the most recent matching issue is closed, reopen it instead of creating
    a new one.

    Append a new dated section for each run using "## YYYY-MM-DD (UTC)".
    To keep the issue bounded: after appending today's section, replace any
    individual daily sections older than 14 days with a single
    "## Historical Summary" section that lists only the count of prior runs
    and any items that remained unresolved across those runs. If a Historical Summary already exists, update it in place — do not create a second one.

    Include links only (no full content duplication). Keep it concise and actionable.
    Flag items that appear in the stale list for the first time (not present in
    the previous dated section) with a ★ marker.

    Sections (in order):
    - Summary metrics (issues opened since last run, currently open PRs, stale
      issues/PRs count, main branch check status, security alerts if accessible)
    - CI health (CI passed status, build/lint/typecheck/test/smoke failures,
      with links to failing runs)
    - Stale issues (no activity >30 days; recommend next step)
    - Stale PRs (no activity >7 days; stale >14 days)
    - Unassigned bugs (label bug, no assignee)
    - Dependency/tooling watchlist (pnpm, Turbo, TypeScript, Vite, Astro,
      Three.js, Playwright, Zig/Skia-related build health)
    - Recommended actions (bulleted checklist)
    - Notes (use "data unavailable" for any inaccessible data source)

    Do NOT comment on or modify individual issues/PRs. Do NOT apply labels.
    Do NOT open PRs. This run must update ONE issue only.

jobs:
  fro-bot:
    name: Fro Bot
    runs-on: ubuntu-latest
    # 30m was tuned for a normal-sized PR. This job's own PR_REVIEW_PROMPT
    # requires running pnpm build (observed 20-25m alone on this repo's
    # regular CI for a large PR) plus typecheck/test/smoke on top of the
    # actual AI review reasoning — 30m leaves no real room once build alone
    # eats most of it. First bumped to 60m, which was still not enough: the
    # "Run Fro Bot" step has its OWN separate inner timeout (see that
    # step's `timeout` input below) that a 60m job ceiling doesn't touch at
    # all. 90m gives ~9m of observed setup-step overhead plus the step's
    # own 80m budget room to actually finish, with cleanup/upload buffer
    # left over. Revisit if this becomes the norm rather than the
    # exception for large-diff PRs.
    timeout-minutes: 90
    if: >-
      (
        github.event.pull_request == null ||
        (
          !github.event.pull_request.head.repo.fork &&
          !endsWith(github.event.pull_request.user.login || '', '[bot]')
        )
      ) && (
        (
          github.event_name == 'issues' &&
          !endsWith(github.event.issue.user.login || '', '[bot]') &&
          (github.event.issue.user.login || '') != 'fro-bot'
        ) ||
        (
          github.event_name == 'pull_request' &&
          !endsWith(github.event.pull_request.user.login || '', '[bot]') &&
          (github.event.pull_request.user.login || '') != 'fro-bot'
        ) ||
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        (
          (github.event_name == 'issue_comment' ||
           github.event_name == 'pull_request_review_comment' ||
           github.event_name == 'discussion_comment') &&
          contains(github.event.comment.body || '', '@fro-bot') &&
          (github.event.comment.user.login || '') != 'fro-bot' &&
          contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association || '')
        )
      )
    steps:
      - id: get-app-token
        name: Get Workflow Access Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APPLICATION_ID }}
          private-key: ${{ secrets.APPLICATION_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
          token: ${{ steps.get-app-token.outputs.token }}
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Cache Nx
        uses: actions/cache@v5
        with:
          path: .nx/cache
          key: ${{ runner.os }}-fro-bot-nx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-fro-bot-nx-

      - name: Cache Skia WASM tools
        uses: actions/cache@v5
        with:
          path: packages/skia/.tools
          key: ${{ runner.os }}-fro-bot-skia-tools-${{ hashFiles('packages/skia/package.json') }}
          restore-keys: |
            ${{ runner.os }}-fro-bot-skia-tools-

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-fro-bot-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-fro-bot-playwright-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Fro Bot
        uses: fro-bot/agent@v0.93.1
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          OPENCODE_PROMPT_ARTIFACT: 'true'
          PROMPT: >-
            ${{
              (github.event_name == 'workflow_dispatch' && (github.event.inputs.prompt || ''))
              || (github.event_name == 'schedule' && env.SCHEDULE_PROMPT)
              || (github.event_name == 'pull_request' && env.PR_REVIEW_PROMPT)
              || ''
            }}
        with:
          github-token: ${{ steps.get-app-token.outputs.token }}
          auth-json: ${{ secrets.OPENCODE_AUTH_JSON }}
          model: ${{ vars.FRO_BOT_MODEL }}
          prompt: ${{ env.PROMPT }}
          # fro-bot/agent's OWN action.yaml default is 1800000ms (30m),
          # entirely separate from this job's `timeout-minutes` above --
          # bumping only the job-level timeout (as an earlier fix here did)
          # was not sufficient: a real run on this PR hit exactly this
          # inner 30m ceiling mid-execution ("Poll timeout reached",
          # elapsedMs: 1800336) and failed via a cascading "response file
          # never written" error, despite the outer job having 60m to
          # spare. 4800000ms (80m) leaves headroom under the 90m job
          # timeout below for the ~9m of setup steps that run before this
          # one and cleanup/artifact-upload after.
          timeout: '4800000'
