name: Build

on:
  workflow_call:
    inputs:
      node-version:
        required: true
        type: string
      node-tag:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          # Full history so `nx affected` can compute the merge-base against the
          # PR's target branch (needs common history, not a shallow clone).
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'pnpm'

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Base for `nx affected`: the PR's target branch on a PR, else the previous
      # commit on a push to main. So a PR only builds/tests/typechecks the projects
      # its diff actually affects (per the nx graph) — not the whole workspace. A
      # change to a workspace-global input (nx.json, lockfile, tsconfig, …) still
      # marks everything affected, which is correct.
      - name: Determine nx affected base
        id: nxbase
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            echo "base=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache Nx
        uses: actions/cache@v5
        with:
          path: .nx/cache
          key: ${{ runner.os }}-nx-${{ inputs.node-tag }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nx-${{ inputs.node-tag }}-

      - name: Cache Skia WASM tools
        uses: actions/cache@v5
        with:
          path: packages/skia/.tools
          key: ${{ runner.os }}-skia-tools-${{ hashFiles('packages/skia/package.json') }}
          restore-keys: |
            ${{ runner.os }}-skia-tools-

      - name: Verify package versions
        run: pnpm sync:pack:verify examples minis

      - name: Verify react subpath wrappers
        run: pnpm sync:react:verify

      - name: Verify publish exports (dist-only publishConfig)
        run: pnpm sync:publish-exports:verify

      - name: Verify source VERSION constants
        run: pnpm sync:versions:verify

      - name: Verify generated schema types
        run: pnpm gen:types:verify

      - name: Verify published docs schemas
        run: pnpm sync:docs:schemas:verify

      - name: Lint
        run: pnpm lint

      - name: Boundaries
        run: pnpm boundaries

      - name: Typecheck
        run: pnpm nx affected -t typecheck --base=${{ steps.nxbase.outputs.base }}

      - name: Build
        # Authenticate the skia WASM toolchain downloads (setup.mjs) so a cold
        # .tools cache doesn't hit the unauthenticated GitHub API rate limit.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm nx affected -t build --base=${{ steps.nxbase.outputs.base }}

      # `nx affected -t test` already runs @three-flatland/skia's test when skia
      # is affected (it's in the test graph and reads the committed lib/*.wasm), so
      # no separate skia test step is needed.
      - name: Test
        run: pnpm nx affected -t test --base=${{ steps.nxbase.outputs.base }}
