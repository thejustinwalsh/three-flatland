name: Build

on:
  workflow_call:
    inputs:
      node-version:
        required: true
        type: string
      node-tag:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'pnpm'

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # If skia's WASM was (re)compiled this run, use the fresh libs; otherwise
      # this step no-ops and skia's build/test use the committed lib/*.wasm.
      - name: Download freshly-built skia WASM (if any)
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: skia-wasm
          path: packages/skia/lib

      - name: Cache Nx
        uses: actions/cache@v5
        with:
          path: .nx/cache
          key: ${{ runner.os }}-nx-${{ inputs.node-tag }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nx-${{ inputs.node-tag }}-

      - name: Cache Skia WASM tools
        uses: actions/cache@v5
        with:
          path: packages/skia/.tools
          key: ${{ runner.os }}-skia-tools-${{ hashFiles('packages/skia/package.json') }}
          restore-keys: |
            ${{ runner.os }}-skia-tools-

      - name: Verify package versions
        run: pnpm sync:pack:verify examples minis

      - name: Verify react subpath wrappers
        run: pnpm sync:react:verify

      - name: Verify publish exports (dist-only publishConfig)
        run: pnpm sync:publish-exports:verify

      - name: Verify source VERSION constants
        run: pnpm sync:versions:verify

      - name: Verify generated schema types
        run: pnpm gen:types:verify

      - name: Verify published docs schemas
        run: pnpm sync:docs:schemas:verify

      - name: Lint
        run: pnpm lint

      - name: Boundaries
        run: pnpm boundaries

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        # Authenticate the skia WASM toolchain downloads (setup.mjs) so a cold
        # .tools cache doesn't hit the unauthenticated GitHub API rate limit.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Test Skia
        run: pnpm --filter @three-flatland/skia test
