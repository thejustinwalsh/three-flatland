packages:
  - packages/*
  - packages/*/example
  - examples/**
  - benchmarks/*
  - minis/*
  - docs
  - skills

catalog:
  '@tweakpane/core': ^2.0.5
  '@tweakpane/plugin-essentials': ^0.2.1
  tweakpane: ^4.0.5
  # Audio engine. zzfx is the synth (one-shot 21-param arrays for SFX);
  # @zzfx-studio/zzfxm is the music sequencer (4-channel patterns), which
  # peer-deps zzfx. pnpm resolves both to a single zzfx install so the
  # synth engine is shared across SFX + music — no duplicate bundle weight.
  # The audio engine lives in docs/src/audio/ and is dynamically imported
  # (NOT in the main bundle); the minis import zzfx directly for standalone
  # playback.
  '@zzfx-studio/zzfxm': ^0.1.5
  zzfx: ^1.3.2
  # Pinned (no caret) — `^10.0.0-alpha.2` semver-matches `10.0.0-canary.X`
  # because canary > alpha alphabetically on the same 10.0.0 base. Our
  # local pnpm lockfile holds alpha.2, but a fresh `npm install` (e.g. in
  # StackBlitz) resolves to the latest matching, which picks up canary
  # builds — and the current canary imports `WebGLCubeRenderTarget` from
  # `three/webgpu` which no released three.js exports. Pin until alpha.3+
  # ships and Renovate can propose the bump.
  '@react-three/fiber': 10.0.0-alpha.2
  '@types/pngjs': ^6.0.5
  '@types/react': ^19.0.2
  '@types/react-dom': ^19.0.2
  '@types/three': ^0.183.1
  '@vitejs/plugin-react': ^4.3.4
  koota: ^0.6.5
  pngjs: ^7.0.0
  react: ^19.2.0
  react-dom: ^19.2.0
  three: ^0.183.1
  typescript: ^5.7.3
  vite: ^6.4.3
  '@gltf-transform/core': ^4.3.0
  # uikit fork (@three-flatland/uikit + kits). Vendored from pmndrs/uikit;
  # these are its runtime deps. yoga-layout ships raw TypeScript with the
  # WASM binary base64-inlined, so there is no .wasm asset to serve.
  '@preact/signals-core': ^1.5.1
  yoga-layout: ^3.2.1
  zod: ^4.4.3
  '@pmndrs/uikit-pub-sub': ^1.0.74
  '@pmndrs/pointer-events': ^6.6.30
  suspend-react: ^0.1.3
  zustand: ^5.0.6
