<!doctype html>
<html lang="en" class="wa-dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slug Text - Vanilla Three.js</title>
    <style>
      :root.wa-dark {
        --wa-font-size-scale: 0.85;
        --wa-form-control-padding-block: 0.5em;
        --wa-form-control-padding-inline: 0.75em;
        --wa-form-control-toggle-size: round(1em, 1px);
        --wa-color-surface-default: rgb(0, 2, 28);
        --wa-color-surface-raised: rgb(28, 40, 77);
        --wa-color-surface-lowered: rgb(0, 2, 28);
        --wa-color-brand-fill-loud: #0b8be6;
        --wa-color-text-normal: #f0edd8;
        --wa-color-text-quiet: #8890a0;
        --wa-border-radius-m: 6px;
        --wa-color-brand-fill-quiet: var(--wa-color-brand-fill-loud);
        --wa-color-brand-on-quiet: var(--wa-color-brand-on-loud);
        --wa-color-neutral-fill-loud: var(--wa-color-surface-raised);
        --wa-color-neutral-on-loud: var(--wa-color-text-normal);
      }
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #00021c;
      }
      canvas { display: block; }

      @font-face {
        font-family: 'Inter-Slug';
        src: url('./Inter-Regular.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
      }

      /* Comparison canvas overlays the WebGPU canvas exactly */
      #compare-canvas {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: 10;
      }

      /* Draggable split divider */
      #split-handle {
        position: fixed;
        top: 0;
        width: 32px;
        height: 100%;
        z-index: 20;
        cursor: col-resize;
        display: none;
      }
      #split-handle::before {
        content: '';
        position: absolute;
        left: 15px;
        top: 0;
        width: 2px;
        height: 100%;
        background: rgba(255, 255, 255, 0.5);
      }
      /* Grab pill on the divider */
      #split-handle::after {
        content: '⋮';
        position: absolute;
        left: 6px;
        top: 50%;
        transform: translateY(-50%);
        width: 20px;
        height: 40px;
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.7);
        font-size: 16px;
        line-height: 40px;
        text-align: center;
      }

      /* Labels on each side of the split */
      .split-label {
        position: fixed;
        top: 8px;
        z-index: 21;
        font-family: monospace;
        font-size: 11px;
        padding: 2px 6px;
        border-radius: 3px;
        background: rgba(0, 2, 28, 0.7);
        pointer-events: none;
        display: none;
      }
      #split-label-left { color: #fff; }
      #split-label-right { color: #ff6464; }

      #status {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 100;
        color: #f0edd8;
        font-family: monospace;
        font-size: 12px;
        background: rgba(0, 2, 28, 0.85);
        padding: 8px 12px;
        border-radius: 6px;
      }
      #ui {
        position: fixed;
        bottom: 12px;
        right: 12px;
        z-index: 100;
        pointer-events: auto;
        padding: 10px;
        background: rgba(0, 2, 28, 0.85);
        border-radius: 8px;
        max-width: calc(100vw - 24px);
      }

      wa-radio-group::part(form-control-input) {
        row-gap: 4px;
        justify-content: center;
      }
      wa-radio[data-line-pos="first"] {
        border-start-start-radius: var(--wa-border-radius-m);
        border-end-start-radius: var(--wa-border-radius-m);
        border-start-end-radius: 0;
        border-end-end-radius: 0;
      }
      wa-radio[data-line-pos="inner"] { border-radius: 0; }
      wa-radio[data-line-pos="last"] {
        border-start-end-radius: var(--wa-border-radius-m);
        border-end-end-radius: var(--wa-border-radius-m);
        border-start-start-radius: 0;
        border-end-start-radius: 0;
      }
      wa-radio[data-line-pos="solo"] { border-radius: var(--wa-border-radius-m); }
    </style>
  </head>
  <body>
    <div id="status">Loading font...</div>
    <div id="computing">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.15)" stroke-width="3" fill="none"/>
        <path d="M12 2a10 10 0 0 1 10 10" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
      #computing {
        display: none;
        position: fixed;
        top: 12px; right: 12px;
        z-index: 200;
      }
      #computing svg { animation: spin 0.7s linear infinite; }
      #computing[data-visible] { display: block; }
    </style>
    <canvas id="compare-canvas"></canvas>
    <div id="split-handle"></div>
    <div id="split-label-left" class="split-label">SLUG</div>
    <div id="split-label-right" class="split-label">Canvas2D</div>

    <div id="ui">
      <wa-radio-group label="Font Size" value="48" size="small" orientation="horizontal">
        <wa-radio value="6" size="small" appearance="button">6</wa-radio>
        <wa-radio value="8" size="small" appearance="button">8</wa-radio>
        <wa-radio value="10" size="small" appearance="button">10</wa-radio>
        <wa-radio value="12" size="small" appearance="button">12</wa-radio>
        <wa-radio value="16" size="small" appearance="button">16</wa-radio>
        <wa-radio value="24" size="small" appearance="button">24</wa-radio>
        <wa-radio value="32" size="small" appearance="button">32</wa-radio>
        <wa-radio value="48" size="small" appearance="button">48</wa-radio>
        <wa-radio value="72" size="small" appearance="button">72</wa-radio>
        <wa-radio value="96" size="small" appearance="button">96</wa-radio>
        <wa-radio value="200" size="small" appearance="button">200</wa-radio>
      </wa-radio-group>
      <div style="display:flex;flex-direction:column;gap:6px;margin-top:8px;color:var(--wa-color-text-normal);font-size:13px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="width:80px">Words</span>
          <wa-slider id="words-slider" size="small" min="5" max="200" value="20" style="width:100px;"></wa-slider>
          <span id="words-value" style="width:28px;text-align:right;">20</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="width:80px">Darken</span>
          <wa-slider id="darken-slider" size="small" min="0" max="100" value="0" style="width:100px;"></wa-slider>
          <span id="darken-value" style="width:28px;text-align:right;">0</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="width:80px">Thicken</span>
          <wa-slider id="thicken-slider" size="small" min="0" max="100" value="0" style="width:100px;"></wa-slider>
          <span id="thicken-value" style="width:28px;text-align:right;">0</span>
        </div>
        <wa-radio-group id="compare-mode" label="Compare" size="small" orientation="horizontal" value="onion" style="margin-top:4px;">
          <wa-radio value="onion" size="small" appearance="button">Onion</wa-radio>
          <wa-radio value="diff" size="small" appearance="button">Diff</wa-radio>
          <wa-radio value="split" size="small" appearance="button">Split</wa-radio>
        </wa-radio-group>
        <div style="display:flex;gap:12px;margin-top:4px;color:var(--wa-color-text-normal);font-size:13px;">
          <label style="display:flex;align-items:center;gap:4px;cursor:pointer;">
            <input type="checkbox" id="runtime-check" /><span><span style="text-decoration:underline">R</span>untime Gen</span></label>
        </div>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
