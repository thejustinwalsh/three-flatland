<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TSL Nodes - Three.js | three-flatland</title>
    <style>
      body {
        margin: 0;
        background: #16191e;
        overflow: hidden;
        font-family: monospace;
      }
      canvas {
        display: block;
        /* Layer-promote so Safari gives the canvas its own GPU layer
           — without this, 60fps canvas paints co-paint with adjacent
           DOM (Tweakpane, overlays) and drop the iframe rAF to ~30. */
        transform: translateZ(0);
        will-change: transform;
        isolation: isolate;
      }
      #attribution {
        position: fixed;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        color: #555;
        font-size: 9px;
        white-space: nowrap;
        z-index: 100;
      }
      #attribution a {
        color: #777;
      }
    </style>
  </head>
  <body>
    <div id="attribution">
      Knight sprite by
      <a href="https://analogstudios.itch.io/camelot" target="_blank">analogStudios_</a>
      (CC0)
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
