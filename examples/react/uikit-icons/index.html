<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>uikit icons - React Three Fiber</title>
    <style>
      /* Body background — matches the docs `--card` surface color
         (oklch 20% 0.008 250 ≈ #16191e). Static so there's no flash
         between page load and first WebGPU frame. */
      html,
      body,
      #root {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #16191e;
      }
      canvas {
        display: block;
        /* Layer-promote so Safari gives the canvas its own GPU layer
           — without this, 60fps canvas paints co-paint with adjacent
           DOM (Tweakpane, overlays) and drop the iframe rAF to ~30. */
        transform: translateZ(0);
        will-change: transform;
        isolation: isolate;
      }
      /* Honest-framing HUD — DOM overlay, not uikit Text, so the
         example stays font-asset-free (no SlugFont to bake/load). */
      #copy {
        position: fixed;
        left: 16px;
        top: 16px;
        z-index: 10;
        max-width: 420px;
        padding: 10px 14px;
        border-radius: 10px;
        background: rgba(11, 13, 17, 0.78);
        color: #f5f6fa;
        font:
          12px/1.5 ui-monospace,
          'JetBrains Mono',
          monospace;
        pointer-events: none;
      }
      #copy strong {
        color: #995bff;
      }
      #copy code {
        color: #00c4e9;
      }
      #draws {
        margin-top: 4px;
        color: #8b8f9a;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="copy">
      <strong>uikit icons</strong> — 26 icons, ONE baked
      <code>SlugShapeSet</code>, ONE <code>InstancedShapeMesh</code>. A
      draw-count / CPU win, <em>not</em> GPU-ms (fill-bound either way).
      <div id="draws"></div>
    </div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
