<!doctype html>
<html lang="en" class="wa-dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slug Text - Vanilla Three.js</title>
    <style>
      :root.wa-dark {
        --wa-font-size-scale: 0.85;
        --wa-form-control-padding-block: 0.5em;
        --wa-form-control-padding-inline: 0.75em;
        --wa-form-control-toggle-size: round(1em, 1px);
        --wa-color-surface-default: rgb(0, 2, 28);
        --wa-color-surface-raised: rgb(28, 40, 77);
        --wa-color-surface-lowered: rgb(0, 2, 28);
        --wa-color-brand-fill-loud: #0b8be6;
        --wa-color-text-normal: #f0edd8;
        --wa-color-text-quiet: #8890a0;
        --wa-border-radius-m: 6px;
        --wa-color-brand-fill-quiet: var(--wa-color-brand-fill-loud);
        --wa-color-brand-on-quiet: var(--wa-color-brand-on-loud);
        --wa-color-neutral-fill-loud: var(--wa-color-surface-raised);
        --wa-color-neutral-on-loud: var(--wa-color-text-normal);
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #00021c;
      }
      canvas {
        display: block;
      }
      #ui {
        position: fixed;
        bottom: 12px;
        right: 12px;
        z-index: 100;
        pointer-events: auto;
        padding: 10px;
        background: rgba(0, 2, 28, 0.85);
        border-radius: 8px;
        max-width: calc(100vw - 24px);
      }
      @font-face {
        font-family: 'Inter-Slug';
        src: url('/Inter-Regular.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
      }
      #status {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 100;
        color: #f0edd8;
        font-family: monospace;
        font-size: 12px;
        background: rgba(0, 2, 28, 0.85);
        padding: 8px 12px;
        border-radius: 6px;
      }
      #html-compare {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, 0);
        z-index: 50;
        pointer-events: none;
        font-family: 'Inter-Slug', sans-serif;
        font-size: 48px;
        line-height: 0;
        color: rgba(255, 100, 100, 0.6);
        white-space: nowrap;
      }

      wa-radio-group::part(form-control-input) {
        row-gap: 4px;
        justify-content: center;
      }
      wa-radio[data-line-pos="first"] {
        border-start-start-radius: var(--wa-border-radius-m);
        border-end-start-radius: var(--wa-border-radius-m);
        border-start-end-radius: 0;
        border-end-end-radius: 0;
      }
      wa-radio[data-line-pos="inner"] {
        border-radius: 0;
      }
      wa-radio[data-line-pos="last"] {
        border-start-end-radius: var(--wa-border-radius-m);
        border-end-end-radius: var(--wa-border-radius-m);
        border-start-start-radius: 0;
        border-end-start-radius: 0;
      }
      wa-radio[data-line-pos="solo"] {
        border-radius: var(--wa-border-radius-m);
      }
    </style>
  </head>
  <body>
    <div id="status">Loading font...</div>
    <div id="html-compare">Hello, Slug!</div>
    <div id="ui">
      <wa-radio-group label="Font Size" value="48" size="small" orientation="horizontal">
        <wa-radio value="16" size="small" appearance="button">16px</wa-radio>
        <wa-radio value="32" size="small" appearance="button">32px</wa-radio>
        <wa-radio value="48" size="small" appearance="button">48px</wa-radio>
        <wa-radio value="96" size="small" appearance="button">96px</wa-radio>
        <wa-radio value="200" size="small" appearance="button">200px</wa-radio>
      </wa-radio-group>
      <label id="overlay-toggle" style="display:flex;align-items:center;gap:6px;margin-top:8px;color:var(--wa-color-text-normal);font-size:13px;cursor:pointer;">
        <input type="checkbox" id="overlay-check" checked /><span><span style="text-decoration:underline">H</span>TML Overlay</span></label>
    </div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
