<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skia - Vanilla Three.js</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a1a;
        color: #eee;
        font-family: system-ui, sans-serif;
      }
      canvas { display: block; }
      #status {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 100;
        padding: 8px 14px;
        background: rgba(0, 0, 0, 0.75);
        border-radius: 6px;
        font-size: 13px;
        font-family: ui-monospace, monospace;
      }
      #status.error { color: #ff6b6b; }
      #status.ok { color: #69db7c; }
    </style>
  </head>
  <body>
    <div id="status">Initializing...</div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
