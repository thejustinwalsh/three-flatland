<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>three-flatland</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #16191e;
      }
      #app {
        position: relative;
        width: 100%;
        height: 100%;
      }
      canvas {
        display: block;
      }
      #loader {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        color: #9aa4b2;
        font: 14px system-ui, sans-serif;
      }
      #fullscreen {
        position: absolute;
        top: 12px;
        right: 12px;
        padding: 6px 10px;
        border: 1px solid #2c3340;
        border-radius: 6px;
        background: transparent;
        color: #9aa4b2;
        font: 12px system-ui, sans-serif;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="loader">Loading…</div>
      <button id="fullscreen" type="button">Fullscreen</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
