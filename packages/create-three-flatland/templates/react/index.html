<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>three-flatland</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #16191e;
      }
      #root {
        position: relative;
        width: 100%;
        height: 100%;
      }
      /* Loading screen overlay. React owns #root, so the overlay lives beside it
         and retires itself with CSS alone: it shows only while #root has no
         <canvas>. The Canvas mounts exactly when the Suspense boundary in
         src/App.tsx resolves (renderer constructed, texture loaded), so this
         tracks the same readiness signal — no removal code, no JS. It sits
         opaque above the bare Suspense fallback. On browsers without :has()
         the overlay simply never shows, which fails safe. */
      #loader {
        position: fixed;
        inset: 0;
        display: none;
        place-items: center;
        background: #16191e;
        pointer-events: none;
      }
      #root:not(:has(canvas)) + #loader {
        display: grid;
      }
      .fl-stack {
        display: grid;
        justify-items: center;
        gap: 20px;
      }
      .fl-mark {
        width: 96px;
        height: 96px;
      }
      /* One soft diagonal glint sweeps the mark — the same turquoise the
         sprite tints on hover — then rests before the next pass. */
      .fl-sweep {
        animation: fl-sweep 2.6s ease-in-out infinite;
      }
      .fl-dot {
        opacity: 0.25;
        animation: fl-dot 1.6s ease-in-out infinite;
      }
      .fl-dot2 {
        animation-delay: 0.2s;
      }
      .fl-dot3 {
        animation-delay: 0.4s;
      }
      @keyframes fl-sweep {
        0% {
          transform: translate(-48px, -48px);
        }
        55%,
        100% {
          transform: translate(48px, 48px);
        }
      }
      @keyframes fl-dot {
        0%,
        60%,
        100% {
          opacity: 0.25;
        }
        30% {
          opacity: 1;
        }
      }
      /* Non-negotiable: reduced motion collapses to a static pose — the mark
         unlit, all three dots on. */
      @media (prefers-reduced-motion: reduce) {
        .fl-sweep {
          animation: none;
          visibility: hidden;
        }
        .fl-dot {
          animation: none;
          opacity: 1;
        }
      }
    </style>
  </head>
